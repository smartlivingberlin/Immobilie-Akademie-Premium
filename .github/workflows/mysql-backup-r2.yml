name: MySQL Backup to Cloudflare R2

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Nur Dump lokal im Runner (kein R2-Upload)"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: mysql-backup-r2
  cancel-in-progress: false

jobs:
  backup:
    name: Dump Railway MySQL and upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      R2_PREFIX: ${{ secrets.R2_PREFIX || 'mysql/production' }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || 'production' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y mysql-client gzip curl unzip gnupg

      - name: Install Railway CLI
        run: |
          set -euo pipefail
          curl -fsSL https://railway.com/install.sh | bash
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Configure AWS CLI for R2
        if: env.DRY_RUN != '1'
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
          else
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
          fi

      - name: Validate required secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          set -euo pipefail
          MISSING=()
          test -n "$RAILWAY_TOKEN" || MISSING+=("RAILWAY_TOKEN")
          test -n "$RAILWAY_PROJECT_ID" || MISSING+=("RAILWAY_PROJECT_ID")
          test -n "$BACKUP_ENCRYPTION_PASSPHRASE" || MISSING+=("BACKUP_ENCRYPTION_PASSPHRASE")
          if [ "$DRY_RUN" != "1" ]; then
            R2_ACCOUNT_ID="$(printf '%s' "$R2_ACCOUNT_ID" | tr -d '\r\n' | xargs)"
            R2_BUCKET="$(printf '%s' "$R2_BUCKET" | tr -d '\r\n' | xargs)"
            R2_ACCESS_KEY_ID="$(printf '%s' "$R2_ACCESS_KEY_ID" | tr -d '\r\n' | xargs)"
            R2_SECRET_ACCESS_KEY="$(printf '%s' "$R2_SECRET_ACCESS_KEY" | tr -d '\r\n' | xargs)"
            test -n "$R2_ACCOUNT_ID" || MISSING+=("R2_ACCOUNT_ID")
            test -n "$R2_ACCESS_KEY_ID" || MISSING+=("R2_ACCESS_KEY_ID")
            test -n "$R2_SECRET_ACCESS_KEY" || MISSING+=("R2_SECRET_ACCESS_KEY")
            test -n "$R2_BUCKET" || MISSING+=("R2_BUCKET")
            if [ -n "$R2_ACCESS_KEY_ID" ] && [ "${#R2_ACCESS_KEY_ID}" -ne 32 ]; then
              echo "::error::R2_ACCESS_KEY_ID hat Länge ${#R2_ACCESS_KEY_ID}, erwartet 32"
              exit 1
            fi
          fi
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::Fehlende GitHub Secrets: ${MISSING[*]}"
            echo "Siehe docs/R2_ACTIVATION_CHECKLIST.md"
            exit 1
          fi

      - name: Create compressed dump
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          set -euo pipefail
          mkdir -p backup
          STAMP="$(date -u +%Y%m%d_%H%M%S)"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          railway run \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service MySQL -- bash -lc '
            set -euo pipefail
            mysqldump \
              -h "$RAILWAY_TCP_PROXY_DOMAIN" \
              -P "$RAILWAY_TCP_PROXY_PORT" \
              -u "$MYSQLUSER" \
              -p"$MYSQLPASSWORD" \
              --single-transaction \
              --quick \
              --routines \
              --triggers \
              --events \
              "$MYSQLDATABASE"
          ' | gzip > "backup/immobilien-akademie-smart_mysql_${STAMP}.sql.gz"
          gzip -t "backup/immobilien-akademie-smart_mysql_${STAMP}.sql.gz"
          ls -lh backup

      - name: Encrypt dump
        env:
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          set -euo pipefail
          PLAIN_FILE="backup/immobilien-akademie-smart_mysql_${STAMP}.sql.gz"
          ENCRYPTED_FILE="${PLAIN_FILE}.gpg"
          gpg --batch --yes --symmetric --cipher-algo AES256 \
            --passphrase "$BACKUP_ENCRYPTION_PASSPHRASE" \
            --output "$ENCRYPTED_FILE" \
            "$PLAIN_FILE"
          test -s "$ENCRYPTED_FILE"
          rm -f "$PLAIN_FILE"
          ls -lh backup

      - name: Capture non-sensitive row counts
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          set -euo pipefail
          railway run \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service MySQL -- bash -lc '
            mysql \
              -h "$RAILWAY_TCP_PROXY_DOMAIN" \
              -P "$RAILWAY_TCP_PROXY_PORT" \
              -u "$MYSQLUSER" \
              -p"$MYSQLPASSWORD" \
              "$MYSQLDATABASE" \
              -N -e "
                SELECT '\''users'\'', COUNT(*) FROM users
                UNION ALL SELECT '\''trial_leads'\'', COUNT(*) FROM trial_leads
                UNION ALL SELECT '\''presentation_codes'\'', COUNT(*) FROM presentation_codes
                UNION ALL SELECT '\''learning_logs'\'', COUNT(*) FROM learning_logs
                UNION ALL SELECT '\''open_questions'\'', COUNT(*) FROM open_questions
                UNION ALL SELECT '\''glossar_terms'\'', COUNT(*) FROM glossar_terms
                UNION ALL SELECT '\''pending_purchases'\'', COUNT(*) FROM pending_purchases;
              "
          ' > "backup/key_counts_${STAMP}.txt"
          cat "backup/key_counts_${STAMP}.txt"

      - name: Upload backup to R2
        if: env.DRY_RUN != '1'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          R2_ACCOUNT_ID="$(printf '%s' "$R2_ACCOUNT_ID" | tr -d '\r\n' | xargs)"
          R2_BUCKET="$(printf '%s' "$R2_BUCKET" | tr -d '\r\n' | xargs)"
          AWS_ACCESS_KEY_ID="$(printf '%s' "$AWS_ACCESS_KEY_ID" | tr -d '\r\n' | xargs)"
          AWS_SECRET_ACCESS_KEY="$(printf '%s' "$AWS_SECRET_ACCESS_KEY" | tr -d '\r\n' | xargs)"
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          BACKUP_FILE="backup/immobilien-akademie-smart_mysql_${STAMP}.sql.gz.gpg"
          COUNTS_FILE="backup/key_counts_${STAMP}.txt"
          DATE_PATH="$(date -u +%Y/%m/%d)"

          aws s3 cp "$BACKUP_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/daily/${DATE_PATH}/" --endpoint-url "$ENDPOINT"
          aws s3 cp "$COUNTS_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/daily/${DATE_PATH}/" --endpoint-url "$ENDPOINT"
          aws s3 cp "$BACKUP_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/latest/immobilien-akademie-smart_mysql_latest.sql.gz.gpg" --endpoint-url "$ENDPOINT"
          aws s3 cp "$COUNTS_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/latest/key_counts_latest.txt" --endpoint-url "$ENDPOINT"

      - name: Upload short-lived GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql-backup-metadata-${{ env.STAMP }}
          path: backup/key_counts_${{ env.STAMP }}.txt
          retention-days: 14

      - name: Job summary
        run: |
          {
            echo "## MySQL Backup"
            echo "- Stamp: \`${STAMP}\`"
            echo "- Dry run: \`${DRY_RUN}\`"
            if [ "$DRY_RUN" = "1" ]; then
              echo "- R2 upload: **übersprungen** (Dry run)"
            else
              echo "- R2 latest: \`${R2_PREFIX}/latest/immobilien-akademie-smart_mysql_latest.sql.gz.gpg\`"
            fi
            echo ""
            echo "### Key counts"
            echo '```'
            cat "backup/key_counts_${STAMP}.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
