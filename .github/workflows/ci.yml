name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Guard against Module 6–8 references
        run: |
          if rg -q 'modul/[678]' client/src server shared 2>/dev/null; then
            echo "Forbidden modul/6-8 route reference found"
            rg 'modul/[678]' client/src server shared
            exit 1
          fi
          if rg -q 'Module[678]' client/src --glob '*.tsx' 2>/dev/null; then
            echo "Forbidden Module6-8 component reference found"
            rg 'Module[678]' client/src --glob '*.tsx'
            exit 1
          fi
      - run: pnpm exec tsc --noEmit --skipLibCheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm audit --audit-level=moderate

  docker-build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image (Railway parity)
        run: docker build -t makler-lernportal:ci .

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm run test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: https://immobilien-akademie-smart.de

  e2e-stripe:
    runs-on: ubuntu-latest
    needs: check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm run test:e2e:stripe-guards
        env:
          PLAYWRIGHT_BASE_URL: https://immobilien-akademie-smart.de
      - name: Stripe live checkout (optional)
        if: vars.STRIPE_E2E_ENABLED == 'true'
        run: pnpm run test:e2e:stripe-live
        env:
          PLAYWRIGHT_BASE_URL: https://immobilien-akademie-smart.de
          MAGIC_LINK_SECRET: ${{ secrets.MAGIC_LINK_SECRET }}
          STRIPE_E2E_ENABLED: "1"
