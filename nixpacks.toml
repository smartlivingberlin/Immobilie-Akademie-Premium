[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.4.1 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "rm -rf node_modules/.cache",
  "NODE_OPTIONS=--max-old-space-size=4096 pnpm build"
]

[variables]
NIXPACKS_SPA_CADDY = "false"

[start]
cmd = "node dist/index.js"
